<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixture Mundial 2026 · Praxia</title>
  <meta name="description" content="Fixture en vivo del Mundial 2026 — horarios, resultados y formaciones." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Header sticky principal -->
  <header class="topbar">
    <div class="tricolor"></div>
    <nav class="navbar">
      <a href="index.html" class="nav-logo-link">
        <img src="assets/images/logo-blanco.png" alt="FIFA World Cup 2026" class="nav-logo" loading="lazy">
        <span class="brand-name">MUNDIAL 2026</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-menu" id="navMenu">
        <div class="nav-tabs">
          <a href="index.html" class="nav-tab active">⚽ Fixture</a>
          <a href="fixture-panini.html" class="nav-tab">🃏 Prode</a>
        </div>
        <div class="nav-controls">
          <label class="sr-only" for="tzSelect">Zona horaria</label>
          <select id="tzSelect" class="nav-select">
            <option value="Europe/Madrid">🇪🇸 España</option>
            <option value="America/Argentina/Buenos_Aires">🇦🇷 Argentina</option>
            <option value="America/Mexico_City">🇲🇽 México</option>
            <option value="America/Bogota">🇨🇴 Colombia</option>
            <option value="America/Santiago">🇨🇱 Chile</option>
            <option value="America/Montevideo">🇺🇾 Uruguay</option>
            <option value="Europe/Paris">🇫🇷 Francia</option>
            <option value="Europe/London">🇬🇧 Reino Unido</option>
            <option value="America/New_York">🇺🇸 EE.UU. Este</option>
            <option value="America/Los_Angeles">🇺🇸 EE.UU. Oeste</option>
          </select>
          <div class="nav-view-toggle">
            <button id="btnList" class="btn-view active" aria-label="Vista lista" aria-pressed="true">☰</button>
            <button id="btnGrid" class="btn-view" aria-label="Vista grilla" aria-pressed="false">⊞</button>
          </div>
          <button id="btnImagen" class="btn-img" aria-label="Descargar PNG">⬇ <span class="btn-label">PNG</span></button>
        </div>
      </div>
    </nav>
    <!-- Navegación de días -->
    <div id="dayNav" class="day-nav" role="navigation" aria-label="Días del torneo"></div>
  </header>

  <!-- Sección Noticias -->
  <section class="news-section" id="newsSection">
    <h2 class="news-title">🎙 Noticias del Mundial</h2>
    <div class="news-track-wrapper">
      <div class="news-track" id="newsTrack"></div>
    </div>
  </section>

  <!-- Contenido principal -->
  <main class="container">
    <div id="status" class="status-bar" hidden></div>
    <section id="capture" class="capture-zone">
      <div id="matches">
        <div class="loading">
          <div class="spinner"></div>
          <p>Cargando partidos…</p>
        </div>
      </div>
    </section>

    <div class="legend">
      <span class="legend-item"><i class="dot dot-live" aria-hidden="true"></i> En vivo</span>
      <span class="legend-item"><i class="dot dot-final" aria-hidden="true"></i> Finalizado</span>
    </div>

    <footer class="footnote">
      <p>Datos: API pública de ESPN · Actualización cada 60 s · <span id="tzFooter">Horarios en Europa/Madrid</span></p>
    </footer>
  </main>

  <!-- Modal de formaciones -->
  <div id="formationModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Formación del partido" hidden>
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Cerrar modal">✕</button>
      <div id="modalContent" class="modal-content"></div>
    </div>
  </div>

  <!-- CDN: GSAP, Vanilla Tilt, html2canvas — en orden para garantizar disponibilidad -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
